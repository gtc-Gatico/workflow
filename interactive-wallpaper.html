<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交互式动态壁纸</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="info">移动鼠标互动 · 点击产生波纹 · 滚动调整粒子大小</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        let ripples = [];
        
        // 鼠标状态
        const mouse = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            lastX: 0,
            lastY: 0,
            isMoving: false
        };

        // 配置参数
        const config = {
            particleCount: 150,
            baseSize: 3,
            connectionDistance: 120,
            mouseRadius: 200,
            friction: 0.95,
            ease: 0.08,
            hueSpeed: 0.2,
            baseHue: 0
        };

        // 初始化画布尺寸
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * config.baseSize + 1;
                this.hue = Math.random() * 360;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.oscillationSpeed = Math.random() * 0.02 + 0.01;
                this.oscillationOffset = Math.random() * Math.PI * 2;
            }

            update(time) {
                // 基础运动
                this.x += this.vx;
                this.y += this.vy;

                // 边界检测
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;

                // 鼠标交互 - 排斥效果
                const dx = mouse.x - this.x;
                const dy = mouse.y - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < config.mouseRadius) {
                    const force = (config.mouseRadius - distance) / config.mouseRadius;
                    const angle = Math.atan2(dy, dx);
                    const pushForce = force * 2;
                    
                    this.vx -= Math.cos(angle) * pushForce * 0.05;
                    this.vy -= Math.sin(angle) * pushForce * 0.05;
                    
                    // 靠近鼠标时变大
                    this.size = Math.min(this.size + 0.1, config.baseSize * 2);
                } else {
                    // 逐渐恢复原始大小
                    if (this.size > config.baseSize) {
                        this.size -= 0.05;
                    }
                }

                // 应用摩擦力
                this.vx *= config.friction;
                this.vy *= config.friction;

                // 保持最小速度
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed < 0.2) {
                    this.vx += (Math.random() - 0.5) * 0.1;
                    this.vy += (Math.random() - 0.5) * 0.1;
                }

                // 颜色变化
                this.hue = (this.hue + config.hueSpeed) % 360;
                
                // 脉动效果
                this.pulseAlpha = this.alpha + Math.sin(time * this.oscillationSpeed + this.oscillationOffset) * 0.1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 70%, 60%, ${this.pulseAlpha})`;
                ctx.fill();
                
                // 添加光晕效果
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${this.pulseAlpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 波纹类
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150;
                this.alpha = 1;
                this.speed = 3;
                this.hue = config.baseHue;
            }

            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.radius < this.maxRadius;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.6})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 内部光晕
                const gradient = ctx.createRadialGradient(this.x, this.y, this.radius * 0.8, this.x, this.y, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 60%, ${this.alpha * 0.2})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // 初始化粒子
        function initParticles() {
            particles = [];
            for (let i = 0; i < config.particleCount; i++) {
                particles.push(new Particle());
            }
        }

        // 绘制连接线
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < config.connectionDistance) {
                        const alpha = (1 - distance / config.connectionDistance) * 0.5;
                        const hue = (particles[i].hue + particles[j].hue) / 2;
                        
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        // 绘制鼠标光晕
        function drawMouseGlow() {
            if (!mouse.isMoving) return;
            
            const gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, config.mouseRadius);
            gradient.addColorStop(0, `hsla(${config.baseHue}, 70%, 60%, 0.1)`);
            gradient.addColorStop(0.5, `hsla(${config.baseHue}, 70%, 60%, 0.05)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, config.mouseRadius, 0, Math.PI * 2);
            ctx.fill();
        }

        // 主循环
        let time = 0;
        function animate() {
            // 半透明背景实现拖尾效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // 更新基础色相
            config.baseHue = (config.baseHue + config.hueSpeed) % 360;

            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(time);
                particle.draw();
            });

            // 绘制连接线
            drawConnections();

            // 更新和绘制波纹
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) ripple.draw();
                return alive;
            });

            // 绘制鼠标光晕
            drawMouseGlow();

            // 更新鼠标速度
            mouse.vx = (mouse.x - mouse.lastX) * config.ease;
            mouse.vy = (mouse.y - mouse.lastY) * config.ease;
            mouse.lastX = mouse.x;
            mouse.lastY = mouse.y;

            // 检测鼠标是否移动
            mouse.isMoving = Math.abs(mouse.vx) > 0.1 || Math.abs(mouse.vy) > 0.1;

            time++;
            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            initParticles();
        });

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('click', (e) => {
            const ripple = new Ripple(e.clientX, e.clientY);
            ripple.hue = config.baseHue;
            ripples.push(ripple);
            
            // 点击时产生粒子爆发
            for (let i = 0; i < 5; i++) {
                const particle = new Particle();
                particle.x = e.clientX;
                particle.y = e.clientY;
                particle.vx = (Math.random() - 0.5) * 8;
                particle.vy = (Math.random() - 0.5) * 8;
                particle.size = Math.random() * 3 + 2;
                particles.push(particle);
                
                // 限制粒子总数
                if (particles.length > config.particleCount + 20) {
                    particles.shift();
                }
            }
        });

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.5 : 0.5;
            config.baseSize = Math.max(1, Math.min(8, config.baseSize + delta));
        }, { passive: false });

        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const ripple = new Ripple(touch.clientX, touch.clientY);
            ripple.hue = config.baseHue;
            ripples.push(ripple);
        });

        // 初始化
        resize();
        initParticles();
        animate();

        // 隐藏光标（可选，如需显示可注释掉）
        // canvas.style.cursor = 'none';
    </script>
</body>
</html>
