<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作流引擎 - 可视化编辑器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Left Sidebar - Node Palette -->
        <aside class="sidebar left-sidebar">
            <h3>节点面板</h3>
            <div class="node-palette">
                <div class="node-category">
                    <h4>触发器</h4>
                    <div class="node-item" draggable="true" data-type="webhook">
                        <span class="node-icon">🌐</span>
                        <span>Webhook</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="schedule">
                        <span class="node-icon">⏰</span>
                        <span>定时触发</span>
                    </div>
                </div>
                <div class="node-category">
                    <h4>动作</h4>
                    <div class="node-item" draggable="true" data-type="httpRequest">
                        <span class="node-icon">📡</span>
                        <span>HTTP 请求</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="code">
                        <span class="node-icon">💻</span>
                        <span>代码执行</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="set">
                        <span class="node-icon">✏️</span>
                        <span>字段设置</span>
                    </div>
                </div>
                <div class="node-category">
                    <h4>流程控制</h4>
                    <div class="node-item" draggable="true" data-type="switch">
                        <span class="node-icon">🔀</span>
                        <span>条件分支</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="merge">
                        <span class="node-icon">🔗</span>
                        <span>数据合并</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="filter">
                        <span class="node-icon">🔍</span>
                        <span>数据过滤</span>
                    </div>
                    <div class="node-item" draggable="true" data-type="splitInBatches">
                        <span class="node-icon">📦</span>
                        <span>分批处理</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Canvas Area -->
        <main class="canvas-container">
            <div class="toolbar">
                <button id="btn-new" class="toolbar-btn">📄 新建</button>
                <button id="btn-save" class="toolbar-btn">💾 保存</button>
                <button id="btn-load" class="toolbar-btn">📂 加载</button>
                <button id="btn-execute" class="toolbar-btn primary">▶️ 执行</button>
                <div class="zoom-controls">
                    <button id="btn-zoom-out" class="toolbar-btn">−</button>
                    <span id="zoom-level">100%</span>
                    <button id="btn-zoom-in" class="toolbar-btn">+</button>
                </div>
            </div>
            <div class="canvas-wrapper">
                <svg id="connections-layer" class="connections-layer"></svg>
                <div id="nodes-canvas" class="nodes-canvas"></div>
            </div>
        </main>

        <!-- Right Sidebar - Node Configuration -->
        <aside class="sidebar right-sidebar" id="config-panel">
            <div class="config-header">
                <h3 id="config-title">节点配置</h3>
                <button id="btn-close-config" class="close-btn">×</button>
            </div>
            <div class="config-content" id="config-content">
                <p class="placeholder-text">选择一个节点进行配置</p>
            </div>
        </aside>
    </div>

    <!-- Execution Log Panel -->
    <div class="execution-log" id="execution-log">
        <div class="log-header">
            <h4>执行日志</h4>
            <button id="btn-close-log" class="close-btn">×</button>
        </div>
        <div class="log-content" id="log-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
